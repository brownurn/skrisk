services:
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: skrisk-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${SKRISK_OPENSEARCH_PORT:-9200}:9200"
      - "${SKRISK_OPENSEARCH_METRICS_PORT:-9600}:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  neo4j:
    image: neo4j:5.26.0-community
    container_name: skrisk-neo4j
    environment:
      NEO4J_AUTH: neo4j/skriskneo4j
      NEO4J_server_http_advertised__address: localhost:7474
      NEO4J_server_bolt_advertised__address: localhost:7687
    ports:
      - "${SKRISK_NEO4J_HTTP_PORT:-7474}:7474"
      - "${SKRISK_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  opensearch-data:
  neo4j-data:
  neo4j-logs:
